name: Build and Deploy Vue Frontend

on:
  push:
    branches:
      - main
      - staging
      # - putra/fix-missing-component

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t vikylorent/invitation-wedding:latest \
            -f deployment/Dockerfile \
            --build-arg VITE_API_BASE_URL=https://invitation.sealorent.site/api \
            --build-arg VITE_APP_NAME="Invitation" \
            --build-arg VITE_APP_ENV=production \
            .

      - name: Tag Docker image with commit SHA
        run: docker tag vikylorent/invitation-wedding:latest vikylorent/invitation-wedding:${{ github.sha }}

      - name: Push Docker image (latest)
        run: docker push vikylorent/invitation-wedding:latest

      - name: Push Docker image (commit SHA)
        run: docker push vikylorent/invitation-wedding:${{ github.sha }}

      - name: Deploy to CapRover
        env:
          CAPROVER_PASSWORD: ${{ secrets.CAPROVER_PASSWORD }}
          CAPROVER_APP_NAME: ${{ secrets.CAPROVER_APP_NAME }}
        run: |
          # Install CapRover CLI
          npm install -g caprover

          # Fail fast if the secret is missing to avoid interactive prompts
          if [ -z "$CAPROVER_PASSWORD" ]; then
            echo "CAPROVER_PASSWORD secret is not set"
            exit 1
          fi

          if [ -z "$CAPROVER_APP_NAME" ]; then
            echo "CAPROVER_APP_NAME secret is not set"
            exit 1
          fi

          # Login explicitly to keep deployment non-interactive in CI
          caprover login --caproverUrl https://captain.sealorent.site \
            --caproverPassword "$CAPROVER_PASSWORD" \
            --caproverName captain-01

          # Deploy to CapRover
          caprover deploy --caproverUrl https://captain.sealorent.site \
            --caproverPassword "$CAPROVER_PASSWORD" \
            --appName "$CAPROVER_APP_NAME" \
            --imageName vikylorent/invitation-wedding:latest
