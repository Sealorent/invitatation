name: Build and Deploy Vue Frontend

on:
  push:
    branches:
      - main
      - staging

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            -t vikylorent/invitation-wedding:latest \
            -t vikylorent/invitation-wedding:${IMAGE_TAG} \
            -f deployment/Dockerfile \
            --build-arg VITE_API_BASE_URL=https://invitation.sealorent.site/api \
            --build-arg VITE_APP_NAME=Invitation \
            --build-arg VITE_APP_ENV=production \
            .

      - name: Push Docker image (latest)
        run: docker push vikylorent/invitation-wedding:latest

      - name: Push Docker image (commit SHA)
        run: docker push vikylorent/invitation-wedding:${IMAGE_TAG}

      - name: Install CapRover CLI
        run: npm install -g caprover

      - name: Validate required secrets
        env:
          CAPROVER_PASSWORD: ${{ secrets.CAPROVER_PASSWORD }}
          CAPROVER_APP_NAME: ${{ secrets.CAPROVER_APP_NAME }}
        run: |
          [ -n "$CAPROVER_PASSWORD" ] || { echo "CAPROVER_PASSWORD is not set"; exit 1; }
          [ -n "$CAPROVER_APP_NAME" ] || { echo "CAPROVER_APP_NAME is not set"; exit 1; }

      - name: Create CapRover config
        env:
          CAPROVER_PASSWORD: ${{ secrets.CAPROVER_PASSWORD }}
        run: |
          cat > caprover-config.json <<EOF
          {
            "caproverUrl": "https://captain.sealorent.site",
            "caproverPassword": "${CAPROVER_PASSWORD}",
            "caproverName": "captain-01"
          }
          EOF

      - name: Login to CapRover
        run: caprover login -c ./caprover-config.json

      - name: Deploy to CapRover
        env:
          CAPROVER_APP_NAME: ${{ secrets.CAPROVER_APP_NAME }}
        run: |
          caprover deploy \
            -n captain-01 \
            -a "$CAPROVER_APP_NAME" \
            -i vikylorent/invitation-wedding:latest